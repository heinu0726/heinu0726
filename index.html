<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加微信</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; }
        .qrcode { width: 250px; height: 250px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tip { margin-top: 20px; font-size: 16px; color: #333; }
        .btn { margin-top: 20px; padding: 12px 30px; background: #07c160; color: white; border: none; border-radius: 25px; font-size: 16px; }
    </style>
</head>
<body>
    < img class="qrcode" src="qrcode.jpg" alt="微信二维码">
    <p class="tip">长按识别二维码 添加微信</p >
    <button class="btn" onclick="jumpWechat()">👉 点我打开微信</button>
    
    <script>
        // 自动尝试唤起微信
        window.onload = function() {
            setTimeout(function() {
                window.location.href = 'weixin://';
            }, 500);
        }
        
        function jumpWechat() {
            window.location.href = 'weixin://';
        }
    </script>
</body>
</html>
