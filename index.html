<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加微信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            padding: 20px;
        }
        .qrcode {
            width: 240px;
            height: 240px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .tip {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .btn {
            background: #07c160;
            color: white;
            padding: 12px 32px;
            border-radius: 24px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    < img class="qrcode" src="qrcode.jpg" alt="微信二维码">
    <p class="tip">长按识别二维码 添加微信</p >
    <a href="weixin://" class="btn">👉 点我打开微信</a >
</body>
</html>
